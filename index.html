<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>NTRK — Kişisel Asistan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --border: #21262d;
            --accent-gradient: linear-gradient(135deg, #38bdf8, #818cf8);
            --green-gradient: linear-gradient(135deg, #34d399, #10b981);
            --red-gradient: linear-gradient(135deg, #fb7185, #e11d48);
            --gold-gradient: linear-gradient(135deg, #fbbf24, #f59e0b);
            --text: #c9d1d9;
            --text-vibrant: #f0f6fc;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #0d1117 80%);
            background-attachment: fixed;
        }

        /* ===== APP LAYOUT ===== */
        #app { padding-bottom: 100px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .topbar { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--glass-border); 
            padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; 
        }
        .topbar-logo { font-family: 'Poppins'; font-weight: 800; font-size: 24px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .section { display: none; padding: 25px; }
        .section.active { display: block; }

        .card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(10px);
            border-radius: var(--radius); 
            padding: 22px; margin-bottom: 18px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        input { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); border-radius: 12px; 
            color: white; margin-bottom: 12px; font-size: 16px;
        }

        .btn { 
            padding: 15px; border-radius: 12px; border: none; cursor: pointer; 
            font-family: 'Poppins'; font-weight: 600; font-size: 14px;
            transition: 0.3s; width: 100%; display: flex; align-items: center; justify-content: center;
        }
        .btn-primary { background: var(--accent-gradient); color: white; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary { background: var(--glass); color: var(--text); border: 1px solid var(--glass-border); }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); 
            border-top: 1px solid var(--glass-border); 
            display: flex; height: 75px; z-index: 90;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: #8b949e; font-size: 11px; border: none; background: none; 
            transition: 0.2s;
        }
        .nav-item.active { color: #38bdf8; font-weight: 600; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* ===== DASHBOARD ELEMENTS ===== */
        .quote-card {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(129, 140, 248, 0.08));
            border: 1px solid rgba(56, 189, 248, 0.2);
            text-align: center; padding: 35px 20px;
        }
        .quote-text { font-style: italic; color: var(--text-vibrant); font-size: 17px; line-height: 1.6; margin-bottom: 10px; }
        .quote-author { color: #38bdf8; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-family: 'Poppins'; font-size: 24px; font-weight: 700; }
    </style>
</head>
<body>

<div id="app">
    <div class="topbar">
        <div class="topbar-logo">NTRK</div>
        <div style="font-size: 10px; color: #34d399; border: 1px solid #34d399; padding: 2px 8px; border-radius: 20px;">CANLI</div>
    </div>

    <div id="home" class="section active">
        <div class="card quote-card">
            <div id="greetingQuote" class="quote-text">Yükleniyor...</div>
            <div id="quoteAuthor" class="quote-author"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
            <div class="card" onclick="showSec('health', document.querySelector('[onclick*=\'health\']'))">
                <p style="font-size:11px; color:#8b949e; margin-bottom:8px; text-transform:uppercase;">💧 Su</p>
                <span id="h-water" class="stat-val" style="color:#38bdf8">0 ml</span>
            </div>
            <div class="card" onclick="showSec('finance', document.querySelector('[onclick*=\'finance\']'))">
                <p style="font-size:11px; color:#8b949e; margin-bottom:8px; text-transform:uppercase;">💰 Nakit</p>
                <span id="h-balance" class="stat-val" style="color:#34d399">0 ₺</span>
            </div>
            <div class="card" style="grid-column: 1 / -1; border-left: 4px solid #fbbf24;">
                <p style="font-size:11px; color:#8b949e; margin-bottom:8px; text-transform:uppercase;">🥇 Altın Gr (Canlı Tahmin)</p>
                <span id="h-gold" class="stat-val" style="color:#fbbf24">Hesaplanıyor...</span>
            </div>
        </div>
    </div>

    <div id="finance" class="section">
        <div class="card" style="text-align: center;">
            <p style="color:#8b949e; margin-bottom:10px;">Toplam Bakiye</p>
            <h1 id="totalBalance" style="font-size: 50px; margin-bottom: 20px; color: #f0f6fc;">0 ₺</h1>
            <input type="number" id="moneyInput" placeholder="Miktar (₺)" inputmode="decimal">
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-primary" style="background:var(--green-gradient);" onclick="updateMoney('in')">GELİR (+)</button>
                <button class="btn btn-primary" style="background:var(--red-gradient);" onclick="updateMoney('out')">GİDER (-)</button>
            </div>
        </div>
    </div>

    <div id="health" class="section">
        <div class="card" style="text-align: center; padding: 40px 20px;">
            <h3 style="margin-bottom: 10px;">Su Tüketimi</h3>
            <div style="font-size: 60px; font-weight: 800; color: #38bdf8; margin: 20px 0;" id="waterDisplay">0 ml</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn btn-secondary" onclick="addWater(250)">💧 +250ml</button>
                <button class="btn btn-secondary" onclick="addWater(500)">🍼 +500ml</button>
            </div>
            <button class="btn btn-secondary" style="margin-top: 20px; color: #fb7185; border: 1px solid rgba(251,113,133,0.3);" onclick="resetWater()">Sıfırla</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="showSec('home', this)">
            <span class="nav-icon">🏠</span><span>Ana Sayfa</span>
        </button>
        <button class="nav-item" onclick="showSec('finance', this)">
            <span class="nav-icon">💸</span><span>Finans</span>
        </button>
        <button class="nav-item" onclick="showSec('health', this)">
            <span class="nav-icon">💪</span><span>Sağlık</span>
        </button>
    </div>
</div>

<script>
    const quotes = [
        { s: "Hayat, sen başka planlar yaparken başına gelenlerdir.", a: "John Lennon" },
        { s: "Eğitim, evreni okuma kabiliyetidir.", a: "Mustafa Kemal Atatürk" },
        { s: "Mutluluk, sahip olduklarının tadını çıkarmaktır.", a: "Marcus Aurelius" },
        { s: "Nereye gideceğini bilmiyorsan, yolun önemi yoktur.", a: "Lewis Carroll" },
        { s: "Zamanın değerini bilin, çünkü o geri gelmez.", a: "Seneca" },
        { s: "Kendine inan, dünyanın sana inanmasını sağla.", a: "Anonim" },
        { s: "Gelecek, bugün ne yaptığınıza bağlıdır.", a: "Mahatma Gandhi" },
        { s: "Karanlığı lanetlemektense bir mum yakmak daha iyidir.", a: "Konfüçyüs" },
        { s: "Gülümsemek, ruhun en kısa yoludur.", a: "Anonim" }
    ];

    function setRandomQuote() {
        const index = Math.floor(Math.random() * quotes.length);
        document.getElementById('greetingQuote').innerText = quotes[index].s;
        document.getElementById('quoteAuthor').innerText = "- " + quotes[index].a;
    }

    let data = JSON.parse(localStorage.getItem('ntrk_final_data_v3')) || { balance: 0, water: 0 };

    function saveData() {
        localStorage.setItem('ntrk_final_data_v3', JSON.stringify(data));
        updateUI();
    }

    function showSec(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function updateMoney(type) {
        const val = parseFloat(document.getElementById('moneyInput').value);
        if(!val || val < 0) return;
        data.balance += (type === 'in' ? val : -val);
        document.getElementById('moneyInput').value = '';
        saveData();
    }

    function addWater(ml) { data.water += ml; saveData(); }
    function resetWater() { data.water = 0; saveData(); }

    async function fetchGoldPrice() {
        try {
            const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const resData = await response.json();
            const price = (2450 / 31.1) * resData.rates.TRY; 
            document.getElementById('h-gold').innerText = Math.floor(price).toLocaleString('tr-TR') + " ₺";
        } catch (e) { document.getElementById('h-gold').innerText = "Güncellenemedi"; }
    }

    function updateUI() {
        document.getElementById('h-water').innerText = data.water + " ml";
        document.getElementById('waterDisplay').innerText = data.water + " ml";
        document.getElementById('h-balance').innerText = data.balance.toLocaleString('tr-TR') + " ₺";
        document.getElementById('totalBalance').innerText = data.balance.toLocaleString('tr-TR') + " ₺";
    }

    // Uygulama yüklendiğinde çalışacaklar
    window.onload = () => {
        setRandomQuote();
        updateUI();
        fetchGoldPrice();
    };
</script>

</body>
</html>
