<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>NTRK — Modern Asistan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ===== YENİ MODERN RENK PALETİ VE GLASSMORPHISM ===== */
        :root {
            --bg: #0d1117; /* Premium Koyu Gri */
            --glass: rgba(255, 255, 255, 0.03); /* Buzlu Cam Efekti */
            --glass-border: rgba(255, 255, 255, 0.08);
            --border: #21262d;
            
            /* Modern Degradeler (Gradients) */
            --accent-gradient: linear-gradient(135deg, #38bdf8, #818cf8); /* Mavi -> Mor */
            --green-gradient: linear-gradient(135deg, #34d399, #10b981);
            --red-gradient: linear-gradient(135deg, #fb7185, #e11d48);
            --gold-gradient: linear-gradient(135deg, #fbbf24, #f59e0b);

            --text: #c9d1d9;
            --text-vibrant: #f0f6fc;
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            overflow-x: hidden;
            /* Arka plana hafif bir ışıltı efekti */
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #0d1117 80%);
        }
        
        h1, h2, h3, .logo { font-family: 'Poppins', sans-serif; font-weight: 700; color: var(--text-vibrant); }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 1000; flex-direction: column; gap: 25px; padding: 30px; 
        }
        
        .login-logo {
            font-size: 56px; font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        /* ===== APP LAYOUT ===== */
        #app { display: none; padding-bottom: 100px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ===== TOPBAR ===== */
        .topbar { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--glass-border); 
            padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; 
        }
        .topbar-logo { font-size: 24px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ===== SECTIONS & CARDS ===== */
        .section { display: none; padding: 25px; }
        .section.active { display: block; }

        /* Modern Glass Card */
        .card { 
            background: var(--glass); 
            border: 1px solid var(--glass-border); 
            backdrop-filter: blur(5px);
            border-radius: var(--radius); 
            padding: 22px; margin-bottom: 18px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        /* ===== INPUTS & BUTTONS ===== */
        input { 
            width: 100%; padding: 15px; background: rgba(0,0,0,0.2); 
            border: 1px solid var(--border); border-radius: 12px; 
            color: white; margin-bottom: 12px; font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

        .btn { 
            padding: 15px; border-radius: 12px; border: none; cursor: pointer; 
            font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px;
            transition: 0.3s; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--accent-gradient); color: white; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        
        .btn-secondary { background: var(--glass); color: var(--text); border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(15px); 
            border-top: 1px solid var(--glass-border); 
            display: flex; height: 75px; padding: 0 10px; z-index: 90;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: #8b949e; font-size: 10px; border: none; background: none; 
            transition: 0.3s;
        }
        .nav-item.active { color: #38bdf8; }
        .nav-icon { font-size: 20px; margin-bottom: 5px; }

        /* ===== DASHBOARD SPECIFIC ===== */
        .quote-card {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.05), rgba(129, 140, 248, 0.05));
            border: 1px solid rgba(56, 189, 248, 0.15);
            text-align: center; padding: 30px 20px;
        }
        .quote-text {
            font-style: italic; color: var(--text-vibrant); font-size: 16px; 
            line-height: 1.6; position: relative;
        }
        .quote-text::before { content: '"'; font-size: 40px; color: rgba(56, 189, 248, 0.2); position: absolute; left: -10px; top: -10px; }
        .quote-author { color: var(--accent2); font-size: 13px; margin-top: 10px; font-weight: 600; }

        .stat-val { font-family: 'Poppins'; font-size: 22px; font-weight: 700; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-logo">NTRK</div>
    <div style="width: 100%; max-width: 320px;">
        <input type="password" id="passInput" placeholder="Şifre (Varsayılan: 1234)">
        <button class="btn btn-primary" onclick="checkLogin()">Giriş Yap</button>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <div class="topbar-logo">NTRK</div>
        <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size:12px;">Çıkış</button>
    </div>

    <div id="home" class="section active">
        <div class="card quote-card">
            <div id="greetingQuote" class="quote-text">Yükleniyor...</div>
            <div id="quoteAuthor" class="quote-author"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
            <div class="card">
                <div style="font-size:12px; color:#8b949e; margin-bottom:5px;">💧 Su</div>

            </div>
            <div class="card">

                <span id="h-balance" class="stat-val" style="color:#34d399">0 ₺</span>
            </div>
            <div class="card" style="grid-column: 1 / -1;">
                <div style="font-size:12px; color:#8b949e; margin-bottom:5px;">🥇 Gram Altın (USD/TRY Tahmin)</div>
                <span id="h-gold" class="stat-val" style="color:#fbbf24">Yükleniyor...</span>
            </div>
        </div>
    </div>

    <div id="finance" class="section">
        <div class="card" style="text-align: center;">
            <h3>Net Varlık</h3>
            <h1 id="totalBalance" style="font-size: 48px; margin: 15px 0; background: var(--green-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0 ₺</h1>
            <input type="number" id="moneyInput" placeholder="Miktar (₺) girin">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="background:var(--green-gradient);" onclick="updateMoney('in')">Gelir (+)</button>
                <button class="btn btn-primary" style="background:var(--red-gradient);" onclick="updateMoney('out')">Gider (-)</button>
            </div>
        </div>
    </div>

        <div class="card" style="text-align: center;">
            <h3>Su Takibi</h3>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
